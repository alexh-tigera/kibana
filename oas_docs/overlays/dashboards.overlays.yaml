overlay: 1.0.0
info:
  title: Overlays for the Dashboards API
  version: 0.0.1
actions:
  # ──────────────────────────────────────────────
  # Tag description
  # ──────────────────────────────────────────────
  - target: '$.tags[?(@.name=="Dashboards")]'
    description: Add tag description with getting started content, externalDocs, and displayName
    update:
      description: |
        A [dashboard](https://www.elastic.co/docs/explore-analyze/dashboards) is a collection of panels (visualizations, maps, Discover sessions, and more) arranged on a grid. Use this API to create and manage dashboards programmatically. To create the individual visualizations that go inside a dashboard, use the [Visualizations API](https://www.elastic.co/docs/api/doc/kibana/operation/operation-createvisualization).

        ## Get started
        > info
        > - **Authentication:** Refer to the [Kibana API documentation > Authentication](https://www.elastic.co/docs/api/doc/kibana).
        > - **Write operations** (`POST`, `PUT`, `DELETE`) also require the `kbn-xsrf: true` header.
        > - **Spaces:** If you use non-default [Kibana spaces](https://www.elastic.co/docs/deploy-manage/manage-spaces), prepend `s/{space_id}/` to the path.

        A [dashboard](https://www.elastic.co/docs/explore-analyze/dashboards) is structured as follows:

        - **`title`** (required): the display name of the dashboard.
        - **`panels`**: array of items placed on the grid. Each item has a `type`, a `grid` position (`x`, `y`, `w`, `h`), and a `config`. Three item shapes are supported:
          - **Common panel**: embeds a visualization, map, search session, or other content. See [Panel types](#panel-types) and [Embedding visualizations](#embedding-visualizations).
          - **Control**: an interactive filter (dropdown, slider). Controls in `panels` apply only to panels in the same section. See [Controls](#controls).
          - **Section**: groups panels and controls under a collapsible `title`. A section has a `grid.y` position and its own nested `panels` array.
        - **`pinned_panels`**: controls pinned at the top of the dashboard that apply to all panels. See [Controls](#controls).
        - **`filters`**, **`query`**, **`time_range`**: filter the data displayed across all panels. See [Dashboard-level filters](#dashboard-level-filters).

        For a complete request example, see [Create a dashboard](https://www.elastic.co/docs/api/doc/kibana/operation/operation-createdashboard).

        All examples on this page use [Kibana sample datasets](https://www.elastic.co/docs/explore-analyze/index#add-sample-data) (`kibana_sample_data_logs`, `kibana_sample_data_ecommerce`, `kibana_sample_data_flights`). To use your own data, replace the `index_pattern` and field names.

        ### Panel types

        The `type` field in each panel determines what it contains. Common types:

        | Type | Content |
        |------|---------|
        | `vis` | Visualization (bar, line, metric, and so on) |
        | `map` | Elastic Maps |
        | `search` | Discover session |
        | `links` | Links panel |
        | `image` | Image panel |

        Additional panel types may be available depending on which Kibana plugins are enabled in your deployment.

        ### Embedding visualizations

        Visualization panels can be embedded **inline** (full config stored in the dashboard) or **linked from library** (references a saved visualization by ID).

        #### Inline

        Use inline when the visualization is specific to this dashboard or must work across Kibana spaces. The visualization configuration goes inside `config.attributes`:

        ```json
        {
          "type": "vis",
          "grid": { "x": 0, "y": 0, "w": 24, "h": 10 },
          "config": {
            "attributes": {
              "type": "metric",
              "title": "Average bytes",
              "data_source": {
                "type": "data_view_spec",
                "index_pattern": "kibana_sample_data_logs",
                "time_field": "timestamp"
              },
              "query": { "query": "" },
              "metrics": [
                { "type": "primary", "operation": "average", "field": "bytes" }
              ]
            }
          }
        }
        ```

        #### Linked from library

        References a saved visualization by ID. The visualization must exist before you create the dashboard. Use the [Visualizations API](https://www.elastic.co/docs/api/doc/kibana/operation/operation-createvisualization) to create it first:

        ```json
        {
          "type": "vis",
          "grid": { "x": 0, "y": 0, "w": 24, "h": 10 },
          "config": {
            "savedObjectId": "1e4f0a30-b3c5-11ef-bd7a-2b6b1a8c0f3d"
          }
        }
        ```

        ### ES|QL visualizations

        To create ES|QL visualizations through the API, embed them inline as `vis` panels. The [Visualizations API](https://www.elastic.co/docs/api/doc/kibana/operation/operation-createvisualization) supports index/data view mode only.

        For `metric` charts, `data_source` is at the top level of `attributes` and `metrics` references columns by name:

        ```json
        {
          "type": "vis",
          "grid": { "x": 0, "y": 0, "w": 12, "h": 6 },
          "config": {
            "attributes": {
              "type": "metric",
              "title": "Total requests",
              "data_source": {
                "type": "esql",
                "query": "FROM logs-* | STATS count = COUNT()"
              },
              "metrics": [
                { "type": "primary", "operation": "value", "column": "count" }
              ]
            }
          }
        }
        ```

        For `xy` charts, `data_source` goes inside each layer. Use `BUCKET(@timestamp, 75, ?_tstart, ?_tend)` for time-series charts to align bucket intervals with the dashboard's selected time range:

        ```json
        {
          "type": "vis",
          "grid": { "x": 0, "y": 0, "w": 48, "h": 12 },
          "config": {
            "attributes": {
              "type": "xy",
              "title": "Requests over time",
              "layers": [
                {
                  "type": "line",
                  "data_source": {
                    "type": "esql",
                    "query": "FROM logs-* | STATS count = COUNT() BY bucket = BUCKET(@timestamp, 75, ?_tstart, ?_tend)"
                  },
                  "x": { "operation": "value", "column": "bucket" },
                  "y": [{ "operation": "value", "column": "count" }]
                }
              ]
            }
          }
        }
        ```

        For a bar chart breaking down by a categorical field:

        ```json
        {
          "type": "vis",
          "grid": { "x": 0, "y": 0, "w": 24, "h": 12 },
          "config": {
            "attributes": {
              "type": "xy",
              "title": "Top hosts by bytes",
              "layers": [
                {
                  "type": "bar_horizontal",
                  "data_source": {
                    "type": "esql",
                    "query": "FROM logs-* | STATS total_bytes = SUM(bytes) BY host.name | SORT total_bytes DESC | LIMIT 10"
                  },
                  "x": { "operation": "value", "column": "host.name" },
                  "y": [{ "operation": "value", "column": "total_bytes" }]
                }
              ]
            }
          }
        }
        ```

        ### Sections

        Sections are collapsible panel groups. A section has a `title`, `collapsed` state, `grid.y` position, and a nested `panels` array. Panels inside a section use the same structure as top-level panels:

        ```json
        {
          "title": "Performance metrics",
          "collapsed": false,
          "grid": { "y": 0 },
          "panels": [
            {
              "type": "vis",
              "grid": { "x": 0, "y": 0, "w": 24, "h": 15 },
              "config": { "..." : "..." }
            }
          ]
        }
        ```

        ### Controls

        Controls are interactive filters. Place them in `pinned_panels` to fix them at the top of the dashboard (applies to all panels). Place them inside a section's `panels` array to scope them to that section.

        Four control types are supported:

        - **`options_list_control`**: a dropdown that filters by selected values for a field in a data view.
        - **`range_slider_control`**: a slider that filters by a numeric range.
        - **`time_slider_control`**: a time range slider.
        - **`esql_control`**: a variable control driven by an ES|QL query.

        Each control requires a `type`, a `config` object, and layout properties (`width`, `grow`):

        ```json
        {
          "pinned_panels": [
            {
              "type": "options_list_control",
              "width": "medium",
              "grow": true,
              "config": {
                "title": "Response code",
                "data_view_id": "90943e30-9a47-11e8-b64d-95841ca0b247",
                "field_name": "response.keyword"
              }
            },
            {
              "type": "range_slider_control",
              "width": "medium",
              "grow": true,
              "config": {
                "title": "Bytes",
                "data_view_id": "90943e30-9a47-11e8-b64d-95841ca0b247",
                "field_name": "bytes"
              }
            }
          ]
        }
        ```

        ### Dashboard-level filters

        The `filters`, `query`, `time_range`, and `refresh_interval` fields apply across all panels:

        ```json
        {
          "title": "Web logs overview",
          "filters": [
            {
              "meta": { "type": "phrase", "field": "response", "params": { "query": "200" } },
              "query": { "match_phrase": { "response": "200" } }
            }
          ],
          "query": { "query": "extension : (\"css\" or \"js\")", "language": "kuery" },
          "time_range": { "from": "now-7d", "to": "now" }
        }
        ```

        ### Error handling

        Common error responses:

        - **`400 Bad Request`**: validation failed. Common causes:
          - Missing required `title`.
          - Invalid panel `type`: check the panel types table above.
          - `null` values for optional fields: omit the field instead of setting it to `null`.
          - `access_control` sent on `PUT`: this field can only be set at creation. Use [`POST`](https://www.elastic.co/docs/api/doc/kibana/operation/operation-createdashboard) with an explicit ID instead.
        - **`401 Unauthorized`**: missing or invalid credentials.
        - **`404 Not Found`**: the dashboard ID does not exist.

        ## When to use the Dashboards API vs. the Visualizations API

        - Use the [Visualizations API](https://www.elastic.co/docs/api/doc/kibana/operation/operation-createvisualization) to create reusable charts saved to your [visualization library](https://www.elastic.co/docs/explore-analyze/visualize/visualize-library). Those visualizations can then be embedded in dashboards as linked panels.
        - Use the Dashboards API when you want to define the full dashboard (panels, filters, controls) in a single request, or when you need ES|QL-based visualizations (inline only).

        ## Next steps

        To manage individual visualizations as reusable saved objects, use the [Visualizations API](https://www.elastic.co/docs/api/doc/kibana/operation/operation-createvisualization). For chart-specific configuration options, see the [chart type documentation](https://www.elastic.co/docs/explore-analyze/visualize/charts).
      externalDocs:
        description: Dashboards documentation
        url: https://www.elastic.co/docs/explore-analyze/dashboards
      x-displayName: Dashboards

  # ──────────────────────────────────────────────
  # POST — summary, examples and code samples
  # ──────────────────────────────────────────────
  - target: "$.paths['/api/dashboards']['post']"
    description: Override summary and add examples and code samples to create endpoint
    update:
      summary: Create a dashboard
      requestBody:
        content:
          application/json:
            examples:
              createDashboardWithVisPanel:
                $ref: '../examples/create_dashboard_request.yaml'
      responses:
        201:
          content:
            application/json:
              examples:
                createDashboardResponse:
                  $ref: '../examples/create_dashboard_response.yaml'
      x-codeSamples:
        - lang: cURL
          label: Create a dashboard - cURL
          source: |
            curl -X POST "${KIBANA_URL}/api/dashboards" \
              -H "Authorization: ApiKey ${API_KEY}" \
              -H "kbn-xsrf: true" \
              -H "Content-Type: application/json" \
              -d '{
              "title": "Web logs overview",
              "panels": [
                {
                  "type": "vis",
                  "grid": { "x": 0, "y": 0, "w": 24, "h": 10 },
                  "config": {
                    "attributes": {
                      "type": "metric",
                      "title": "Average response bytes",
                      "data_source": {
                        "type": "data_view_spec",
                        "index_pattern": "kibana_sample_data_logs",
                        "time_field": "timestamp"
                      },
                      "query": { "query": "" },
                      "metrics": [
                        {
                          "type": "primary",
                          "operation": "average",
                          "field": "bytes",
                          "format": { "type": "number", "decimals": 0, "compact": true }
                        }
                      ]
                    }
                  }
                }
              ]
            }'
        - lang: Console
          label: Create a dashboard - Console
          source: |
            POST kbn:/api/dashboards
            {
              "title": "Web logs overview",
              "panels": [
                {
                  "type": "vis",
                  "grid": { "x": 0, "y": 0, "w": 24, "h": 10 },
                  "config": {
                    "attributes": {
                      "type": "metric",
                      "title": "Average response bytes",
                      "data_source": {
                        "type": "data_view_spec",
                        "index_pattern": "kibana_sample_data_logs",
                        "time_field": "timestamp"
                      },
                      "query": { "query": "" },
                      "metrics": [
                        {
                          "type": "primary",
                          "operation": "average",
                          "field": "bytes",
                          "format": { "type": "number", "decimals": 0, "compact": true }
                        }
                      ]
                    }
                  }
                }
              ]
            }

  # ──────────────────────────────────────────────
  # GET /api/dashboards — examples and code samples
  # ──────────────────────────────────────────────
  - target: "$.paths['/api/dashboards']['get']"
    description: Add examples and code samples to search endpoint
    update:
      responses:
        '200':
          content:
            application/json:
              examples:
                searchDashboardsResponse:
                  $ref: '../examples/search_dashboards_response.yaml'
      x-codeSamples:
        - lang: cURL
          label: Search dashboards - cURL
          source: |
            curl -X GET "${KIBANA_URL}/api/dashboards?query=web+logs&per_page=10" \
              -H "Authorization: ApiKey ${API_KEY}"
        - lang: Console
          label: Search dashboards - Console
          source: |
            GET kbn:/api/dashboards?query=web+logs&per_page=10

  # ──────────────────────────────────────────────
  # GET /api/dashboards/{id} — examples and code samples
  # ──────────────────────────────────────────────
  - target: "$.paths['/api/dashboards/{id}']['get']"
    description: Add examples and code samples to get endpoint
    update:
      responses:
        '200':
          content:
            application/json:
              examples:
                getDashboardResponse:
                  $ref: '../examples/get_dashboard_response.yaml'
      x-codeSamples:
        - lang: cURL
          label: Get a dashboard - cURL
          source: |
            curl -X GET "${KIBANA_URL}/api/dashboards/3c4b8e10-d57a-11ef-9a52-4f3c2a8d0e1b" \
              -H "Authorization: ApiKey ${API_KEY}"
        - lang: Console
          label: Get a dashboard - Console
          source: |
            GET kbn:/api/dashboards/3c4b8e10-d57a-11ef-9a52-4f3c2a8d0e1b

  # ──────────────────────────────────────────────
  # PUT — summary and code samples
  # ──────────────────────────────────────────────
  - target: "$.paths['/api/dashboards/{id}']['put']"
    description: Override summary and add code samples to update endpoint
    update:
      summary: Update a dashboard
      description: >-
        Creates a new dashboard with the given ID if none exists, or replaces the
        complete state of an existing one. This is a full replacement, not a partial
        update. To make targeted changes, retrieve the current state first with
        GET /api/dashboards/{id}, apply your changes, and submit the full updated object.
      responses:
        '401':
          description: Unauthorized
      x-codeSamples:
        - lang: cURL
          label: Upsert dashboard - cURL
          source: |
            curl -X PUT "${KIBANA_URL}/api/dashboards/3c4b8e10-d57a-11ef-9a52-4f3c2a8d0e1b" \
              -H "Authorization: ApiKey ${API_KEY}" \
              -H "kbn-xsrf: true" \
              -H "Content-Type: application/json" \
              -d '{
              "title": "Web logs overview (updated)",
              "panels": [
                {
                  "type": "vis",
                  "grid": { "x": 0, "y": 0, "w": 24, "h": 10 },
                  "config": {
                    "attributes": {
                      "type": "metric",
                      "title": "Average response bytes",
                      "data_source": {
                        "type": "data_view_spec",
                        "index_pattern": "kibana_sample_data_logs",
                        "time_field": "timestamp"
                      },
                      "query": { "query": "" },
                      "metrics": [
                        {
                          "type": "primary",
                          "operation": "average",
                          "field": "bytes",
                          "format": { "type": "number", "decimals": 1 }
                        }
                      ]
                    }
                  }
                }
              ]
            }'
        - lang: Console
          label: Upsert dashboard - Console
          source: |
            PUT kbn:/api/dashboards/3c4b8e10-d57a-11ef-9a52-4f3c2a8d0e1b
            {
              "title": "Web logs overview (updated)",
              "panels": [
                {
                  "type": "vis",
                  "grid": { "x": 0, "y": 0, "w": 24, "h": 10 },
                  "config": {
                    "attributes": {
                      "type": "metric",
                      "title": "Average response bytes",
                      "data_source": {
                        "type": "data_view_spec",
                        "index_pattern": "kibana_sample_data_logs",
                        "time_field": "timestamp"
                      },
                      "query": { "query": "" },
                      "metrics": [
                        {
                          "type": "primary",
                          "operation": "average",
                          "field": "bytes",
                          "format": { "type": "number", "decimals": 1 }
                        }
                      ]
                    }
                  }
                }
              ]
            }

  # ──────────────────────────────────────────────
  # DELETE — code samples
  # ──────────────────────────────────────────────
  - target: "$.paths['/api/dashboards/{id}']['delete']"
    description: Add code samples to delete endpoint
    update:
      x-codeSamples:
        - lang: cURL
          label: Delete a dashboard - cURL
          source: |
            curl -X DELETE "${KIBANA_URL}/api/dashboards/3c4b8e10-d57a-11ef-9a52-4f3c2a8d0e1b" \
              -H "Authorization: ApiKey ${API_KEY}" \
              -H "kbn-xsrf: true"
        - lang: Console
          label: Delete a dashboard - Console
          source: |
            DELETE kbn:/api/dashboards/3c4b8e10-d57a-11ef-9a52-4f3c2a8d0e1b
