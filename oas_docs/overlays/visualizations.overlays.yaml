  # ──────────────────────────────────────────────
  # POST — examples and code samples
  # ──────────────────────────────────────────────
  - target: "$.paths['/api/visualizations']['post']"
    description: Add examples and code samples to create endpoint
    update:
      requestBody:
        content:
          application/json:
            examples:
              createMetricVisualization:
                $ref: '../examples/create_metric_visualization_request.yaml'
              createLineChartVisualization:
                $ref: '../examples/create_xy_visualization_request.yaml'
              createDonutVisualization:
                $ref: '../examples/create_pie_visualization_request.yaml'
      responses:
        201:
          content:
            application/json:
              examples:
                metricVisualizationResponse:
                  $ref: '../examples/create_metric_visualization_response.yaml'
                lineChartVisualizationResponse:
                  $ref: '../examples/create_xy_visualization_response.yaml'
                donutVisualizationResponse:
                  $ref: '../examples/create_pie_visualization_response.yaml'
      x-codeSamples:
        - lang: cURL
          label: Create a metric visualization - cURL
          source: |
            curl -X POST "${KIBANA_URL}/api/visualizations" \
              -H "Authorization: ApiKey ${API_KEY}" \
              -H "kbn-xsrf: true" \
              -H "Content-Type: application/json" \
              -d '{
              "type": "metric",
              "title": "Average response time",
              "data_source": {
                "type": "data_view_spec",
                "index_pattern": "kibana_sample_data_logs",
                "time_field": "timestamp"
              },
              "filters": [],
              "query": { "query": "" },
              "metrics": [{
                "type": "primary",
                "operation": "average",
                "field": "bytes",
                "format": { "type": "number", "decimals": 0, "compact": true },
                "filter": { "expression": "" },
                "labels": { "alignment": "left" },
                "value": { "alignment": "right" },
                "icon": { "name": "empty" }
              }]
            }'
        - lang: Console
          label: Create a metric visualization - Console
          source: |
            POST kbn:/api/visualizations
            {
              "type": "metric",
              "title": "Average response time",
              "data_source": {
                "type": "data_view_spec",
                "index_pattern": "kibana_sample_data_logs",
                "time_field": "timestamp"
              },
              "filters": [],
              "query": { "query": "" },
              "metrics": [{
                "type": "primary",
                "operation": "average",
                "field": "bytes",
                "format": { "type": "number", "decimals": 0, "compact": true },
                "filter": { "expression": "" },
                "labels": { "alignment": "left" },
                "value": { "alignment": "right" },
                "icon": { "name": "empty" }
              }]
            }

  # ──────────────────────────────────────────────
  # GET /api/visualizations — examples and code samples
  # ──────────────────────────────────────────────
  - target: "$.paths['/api/visualizations']['get']"
    description: Add examples and code samples to search endpoint
    update:
      responses:
        200:
          content:
            application/json:
              examples:
                searchVisualizationsResponse:
                  $ref: '../examples/search_visualizations_response.yaml'
      x-codeSamples:
        - lang: cURL
          label: Search visualizations - cURL
          source: |
            curl -X GET "${KIBANA_URL}/api/visualizations?query=response+time&per_page=10" \
              -H "Authorization: ApiKey ${API_KEY}"
        - lang: Console
          label: Search visualizations - Console
          source: |
            GET kbn:/api/visualizations?query=response+time&per_page=10

  # ──────────────────────────────────────────────
