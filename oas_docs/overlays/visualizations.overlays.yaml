          label: Get a visualization - cURL
          source: |
            curl -X GET "${KIBANA_URL}/api/visualizations/1e4f0a30-b3c5-11ef-bd7a-2b6b1a8c0f3d" \
              -H "Authorization: ApiKey ${API_KEY}"
        - lang: Console
          label: Get a visualization - Console
          source: |
            GET kbn:/api/visualizations/1e4f0a30-b3c5-11ef-bd7a-2b6b1a8c0f3d

  # ──────────────────────────────────────────────
  # PUT — code samples
  # ──────────────────────────────────────────────
