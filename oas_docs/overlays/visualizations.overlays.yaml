                "time_field": "timestamp"
              },
              "filters": [],
              "query": { "query": "" },
              "metrics": [{
                "type": "primary",
                "operation": "average",
                "field": "bytes",
                "format": { "type": "number", "decimals": 1 },
                "filter": { "query": "" },
