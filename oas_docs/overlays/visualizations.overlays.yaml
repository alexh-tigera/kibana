          label: Create or update a visualization - cURL
          source: |
            curl -X PUT "${KIBANA_URL}/api/visualizations/1e4f0a30-b3c5-11ef-bd7a-2b6b1a8c0f3d" \
              -H "Authorization: ApiKey ${API_KEY}" \
              -H "kbn-xsrf: true" \
              -H "Content-Type: application/json" \
              -d '{
              "type": "metric",
              "title": "Average response time (updated)",
              "data_source": {
                "type": "data_view_spec",
                "index_pattern": "kibana_sample_data_logs",
                "time_field": "timestamp"
              },
              "filters": [],
              "query": { "query": "" },
              "metrics": [{
                "type": "primary",
                "operation": "average",
                "field": "bytes",
                "format": { "type": "number", "decimals": 1 },
                "filter": { "expression": "" },
                "labels": { "alignment": "left" },
                "value": { "alignment": "right" },
                "icon": { "name": "empty" }
              }]
            }'
        - lang: Console
          label: Create or update a visualization - Console
          source: |
            PUT kbn:/api/visualizations/1e4f0a30-b3c5-11ef-bd7a-2b6b1a8c0f3d
            {
              "type": "metric",
              "title": "Average response time (updated)",
              "data_source": {
                "type": "data_view_spec",
                "index_pattern": "kibana_sample_data_logs",
                "time_field": "timestamp"
              },
              "filters": [],
