summary: Create a dashboard with a metric visualization panel
description: >
  Creates a dashboard named "Web logs overview" with a single metric visualization panel showing
  average response bytes. Uses the Kibana sample web logs dataset (`kibana_sample_data_logs`).
  Visualization panel configuration is nested under `config.attributes`.
value:
  title: Web logs overview
  panels:
    - type: vis
      grid:
        x: 0
        y: 0
        w: 24
        h: 10
      config:
        attributes:
          type: metric
          title: Average response bytes
          data_source:
            type: data_view_spec
            index_pattern: kibana_sample_data_logs
            time_field: timestamp
          query:
            query: ''
            language: kuery
          metrics:
            - type: primary
              operation: average
              field: bytes
              format:
                type: number
                decimals: 0
                compact: true
