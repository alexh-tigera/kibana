summary: Create dashboard response
description: >
  Response to creating a dashboard. Includes the generated dashboard ID, the full dashboard
  state in `data` (including all default option values), and metadata.
value:
  id: 3c4b8e10-d57a-11ef-9a52-4f3c2a8d0e1b
  data:
    title: Web logs overview
    description: Traffic overview using web logs sample data.
    panels:
      - type: vis
        grid:
          x: 0
          y: 0
          w: 24
          h: 12
        uid: panel-1
        config:
          attributes:
            type: xy
            title: Requests over time (DSL)
            data_source:
              type: data_view_spec
              index_pattern: kibana_sample_data_logs
              time_field: timestamp
            query:
              query: ''
              language: kuery
            layers:
              - type: line
                data_source:
                  type: data_view_spec
                  index_pattern: kibana_sample_data_logs
                  time_field: timestamp
                x:
                  operation: date_histogram
                  field: timestamp
                y:
                  - operation: count
                    format:
                      type: number
                      decimals: 0
      - type: vis
        grid:
          x: 24
          y: 0
          w: 24
          h: 12
        uid: panel-2
        config:
          attributes:
            type: xy
            title: Requests over time (ES|QL)
            layers:
              - type: line
                data_source:
                  type: esql
                  query: >-
                    FROM kibana_sample_data_logs | STATS count = COUNT() BY bucket = BUCKET(@timestamp, 75, ?_tstart, ?_tend)
                x:
                  operation: value
                  column: bucket
                y:
                  - operation: value
                    column: count
      - type: vis
        grid:
          x: 0
          y: 12
          w: 48
          h: 10
        uid: panel-3
        config:
          savedObjectId: 1e4f0a30-b3c5-11ef-bd7a-2b6b1a8c0f3d
    options:
      hide_panel_titles: false
      hide_panel_borders: false
      use_margins: true
      auto_apply_filters: true
      sync_colors: false
      sync_cursor: true
      sync_tooltips: false
    filters: []
    query:
      query: ''
      language: kuery
  meta:
    managed: false
