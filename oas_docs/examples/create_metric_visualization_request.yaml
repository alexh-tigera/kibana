summary: Create a metric visualization
description: >
  Creates a metric chart that displays the average bytes. Uses the Kibana sample web logs dataset (`kibana_sample_data_logs`).
value:
  type: metric
  title: Average response time
  data_source:
    type: data_view_spec
    index_pattern: kibana_sample_data_logs
    time_field: timestamp
  filters: []
  query:
    query: ''
    language: kuery
  metrics:
    - type: primary
      operation: average
      field: bytes
      format:
        type: number
        decimals: 0
        compact: true
      filter:
        expression: ''
      labels:
        alignment: left
      value:
        alignment: right
      icon:
        name: empty
