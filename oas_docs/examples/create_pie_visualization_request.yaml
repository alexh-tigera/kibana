summary: Create a donut chart visualization
description: >
  Creates a donut chart showing web traffic distribution by operating system. Uses the Kibana sample web logs dataset (`kibana_sample_data_logs`).
value:
  type: pie
  title: Traffic by operating system
  donut_hole: m
  filters: []
  data_source:
    type: data_view_spec
    index_pattern: kibana_sample_data_logs
    time_field: timestamp
  query:
    query: ''
    language: kuery
  legend:
    visibility: auto
    size: auto
  values:
    mode: percentage
    percent_decimals: 1
  metrics:
    - operation: count
      format:
        type: number
        decimals: 0
      filter:
        expression: ''
  group_by:
    - operation: terms
      fields:
        - machine.os.keyword
      limit: 5
      color:
        mode: categorical
        palette: default
        mapping: []
