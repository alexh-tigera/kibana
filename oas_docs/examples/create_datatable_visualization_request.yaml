summary: Create a data table visualization
description: >
  Creates a data table showing top client IPs by request count. Uses the Kibana sample web logs dataset (`kibana_sample_data_logs`).
value:
  type: data_table
  title: Top client IPs by request count
  filters: []
  query:
    query: ''
  data_source:
    type: data_view_spec
    index_pattern: kibana_sample_data_logs
    time_field: timestamp
  density:
    mode: default
  metrics:
    - operation: count
      format:
        type: number
        decimals: 0
      filter:
        expression: ''
  rows:
    - operation: terms
      fields:
        - clientip
      limit: 20
