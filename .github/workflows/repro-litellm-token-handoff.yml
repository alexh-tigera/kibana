name: Repro LiteLLM Token Handoff

run-name: Repro LiteLLM token handoff

on:
  push:
    branches:
      - gh-claude-review

env:
  CLAUDE_MODEL: llm-gateway/claude-opus-4-5

jobs:
  mint-token:
    name: Mint token
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      api_key: ${{ steps.mint.outputs.api_key }}
    steps:
      - name: Mint LiteLLM token
        id: mint
        uses: elastic/github-actions/litellm-token@cd6ed0cb2ac3e8c6d84a5ffed58eda02f4165faa # v3.0.0
        with:
          base-url: ${{ secrets.LITELLM_BASE_URL }}
          master-key: ${{ secrets.LITELLM_MASTER_API_KEY }}
          models: ${{ env.CLAUDE_MODEL }}
          key-ttl: 15m
          max-budget: '5'

  claude-review:
    needs: mint-token
    runs-on: ubuntu-latest
    permissions:
      contents: read # needed to checkout repo
      issues: read # needed to read PR description, conversation, comments, and labels
      pull-requests: write # needed to post review comments and inline comments on the diff
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run Claude PR Review
        uses: anthropics/claude-code-action@64c7a0ef71df67b14cb4471f4d9c8565c61042bf # v1.0.66
        with:
          anthropic_api_key: ${{ needs.mint-token.outputs.api_key }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: '/review'
          claude_args: '--max-turns 5'
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.LITELLM_BASE_URL }}
          ANTHROPIC_MODEL: ${{ env.CLAUDE_MODEL }}

  revoke-token:
    if: ${{ always() }}
    needs: [mint-token, claude-review, claude-review-comment]
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Revoke LiteLLM token
        id: revoke
        uses: elastic/github-actions/litellm-token@cd6ed0cb2ac3e8c6d84a5ffed58eda02f4165faa # v3.0.0
        with:
          operation: revoke
          base-url: ${{ secrets.LITELLM_BASE_URL }}
          master-key: ${{ secrets.LITELLM_MASTER_API_KEY }}
          api-key: ${{ needs.mint-token.outputs.api_key }}
