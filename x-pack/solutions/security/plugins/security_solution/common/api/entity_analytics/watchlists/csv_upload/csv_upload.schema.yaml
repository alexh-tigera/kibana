openapi: 3.0.0
info:
  title: Watchlist CSV Upload Schema
  version: "2023-10-31"

paths:
  /api/entity_analytics/watchlists/{watchlist_id}/csv_upload:
    post:
      x-labels: [ess, serverless]
      x-codegen-enabled: true
      x-state: Technical Preview
      operationId: UploadWatchlistCsv
      summary: Upload a CSV file to add entities to a watchlist
      description: |
        Uploads a CSV file to add entities to a watchlist. The CSV must contain a header row
        with a "type" column (user, host, service, or generic) and one or more ECS identity
        fields (e.g. "user.name", "host.hostname") used to match entities in the entity store.

        Matched entities are added to the watchlist and their `entity.attributes.watchlists`
        field is updated in the entity store.

        Each row will match up to 10,000 entities.
      parameters:
        - name: watchlist_id
          in: path
          required: true
          schema:
            type: string
          description: The ID of the watchlist to add entities to
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: The CSV file to upload.
              required:
                - file
      responses:
        "200":
          description: Upload successful
          content:
            application/json:
              schema:
                type: object
                example:
                  successful: 1
                  failed: 1
                  unmatched: 1
                  total: 3
                  items:
                    - status: "success"
                      matchedEntities: 1
                    - status: "failure"
                      matchedEntities: 0
                      error: "Invalid entity type"
                    - status: "unmatched"
                      matchedEntities: 0
                properties:
                  successful:
                    type: integer
                  failed:
                    type: integer
                  total:
                    type: integer
                  unmatched:
                    type: integer
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/WatchlistCsvUploadResponseItem"
                required:
                  - successful
                  - failed
                  - total
                  - unmatched
                  - items
        "413":
          description: File too large

components:
  schemas:
    WatchlistCsvUploadResponseItem:
      type: object
      properties:
        status:
          type: string
          enum:
            - success
            - failure
            - unmatched
        matchedEntities:
          type: integer
        error:
          type: string
      required:
        - status
        - matchedEntities
