requestBody:
  content:
    application/json:
      examples:
        createHostEntityExample:
          summary: "Create a host entity"
          description: "Create a new host entity record with basic host and entity fields."
          value:
            entity:
              id: "host:web-server-prod-01"
              name: "web-server-prod-01"
              type: "host"
              source:
                - "manual"
              attributes:
                asset: true
                managed: true
            host:
              name: "web-server-prod-01"
              hostname:
                - "web-server-prod-01.example.com"
              ip:
                - "10.0.1.42"
              os:
                name: "Ubuntu"
                type: "linux"
            asset:
              environment: "production"
              criticality: "high_impact"
              business_unit: "Engineering"
responses:
  200:
    description: "Indicates the entity was successfully created."
    content:
      application/json:
        examples:
          createSuccessExample:
            summary: "Entity created"
            description: "The entity record was successfully created in the Entity Store."
            value:
              ok: true
  400:
    description: "Bad request."
    content:
      application/json:
        examples:
          badRequestExample:
            summary: "Invalid entity"
            description: "The request body does not match the expected entity schema."
            value:
              statusCode: 400
              error: "Bad Request"
              message: "Invalid entity record"
  409:
    description: "Conflict."
    content:
      application/json:
        examples:
          conflictExample:
            summary: "Entity already exists"
            description: "An entity with the specified identifier already exists."
            value:
              statusCode: 409
              error: "Conflict"
              message: "Entity already exists"
x-codeSamples:
  - lang: curl
    source: |
      curl -X POST -H "kbn-xsrf: true" -H "Authorization: ApiKey ${API_KEY}" \
        -H "Content-Type: application/json" \
        -d '{"entity":{"id":"host:web-server-prod-01","name":"web-server-prod-01","type":"host"},"host":{"name":"web-server-prod-01"}}' \
        "${KIBANA_URL}/api/security/entity_store/entities/host"
  - lang: Console
    source: |
      POST kbn://api/security/entity_store/entities/host
      {
        "entity": {
          "id": "host:web-server-prod-01",
          "name": "web-server-prod-01",
          "type": "host"
        },
        "host": {
          "name": "web-server-prod-01"
        }
      }
