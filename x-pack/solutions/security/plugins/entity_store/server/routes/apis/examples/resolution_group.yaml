responses:
  200:
    description: "Indicates a successful response."
    content:
      application/json:
        examples:
          resolutionGroupExample:
            summary: "Resolution group with linked entities"
            description: "Returns the resolution group for an entity, including all linked entity identifiers."
            value:
              target_id: "arn:aws:iam::123456789012:user/jane.doe"
              entity_ids:
                - "arn:aws:iam::123456789012:user/jane.doe"
                - "arn:aws:iam::123456789012:user/jdoe"
                - "arn:aws:iam::123456789012:user/j.doe"
  400:
    description: "Bad request."
    content:
      application/json:
        examples:
          truncatedSearchExample:
            summary: "Search results truncated"
            description: "The resolution search returned too many results and was truncated."
            value:
              statusCode: 400
              error: "Bad Request"
              message: "Resolution search truncated"
  404:
    description: "Entity not found."
    content:
      application/json:
        examples:
          notFoundExample:
            summary: "Entity not found"
            description: "The specified entity does not exist or has no resolution group."
            value:
              statusCode: 404
              error: "Not Found"
              message: "Entities not found"
x-codeSamples:
  - lang: curl
    source: |
      curl -X GET -H "Authorization: ApiKey ${API_KEY}" \
        "${KIBANA_URL}/api/security/entity_store/resolution/group?entity_id=arn%3Aaws%3Aiam%3A%3A123456789012%3Auser%2Fjane.doe"
  - lang: Console
    source: |
      GET kbn://api/security/entity_store/resolution/group?entity_id=arn:aws:iam::123456789012:user/jane.doe
