version: '1'
name: 'sources.hubspot.list_pipelines'
description: 'List HubSpot pipelines and their stages for deals or tickets. Use to discover valid pipeline IDs and deal stage IDs before filtering with search_deals. Returns pipeline labels, IDs, and all stage IDs with their labels. Inputs: objectType (choice: deals|tickets, optional — defaults to deals).'
tags: ['agent-builder-tool']
enabled: true
triggers:
  - type: 'manual'
inputs:
  - name: objectType
    type: choice
    options:
      - 'deals'
      - 'tickets'
    required: false
    description: 'The CRM object type to list pipelines for. Defaults to "deals". Use "tickets" for support ticket pipelines.'
steps:
  - name: list-pipelines
    type: hubspot.listPipelines
    connector-id: <%= hubspot-stack-connector-id %>
    with:
      objectType: "${{inputs.objectType}}"
  - name: map-results
    type: data.map
    items: ${{ steps['list-pipelines'].output }}
    with:
      fields:
        results:
          $map: { items: "${{ item.results }}", item: "pipeline" }
          id: "${{ pipeline.id }}"
          label: "${{ pipeline.label }}"
          display_order: "${{ pipeline.displayOrder }}"
          stages:
            $map: { items: "${{ pipeline.stages }}", item: "stage" }
            id: "${{ stage.id }}"
            label: "${{ stage.label }}"
            display_order: "${{ stage.displayOrder }}"
            is_closed: "${{ stage.metadata.isClosed }}"
            # probability: "${{ stage.metadata.probability }}"
