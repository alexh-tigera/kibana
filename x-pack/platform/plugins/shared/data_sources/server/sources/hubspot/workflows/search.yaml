version: '1'
name: 'sources.hubspot.search'
description: |
  Search HubSpot CRM records. Provide objectType to search or list one type (contacts, companies, deals, or tickets) — omit query to list all records. Omit objectType to search all types simultaneously. When objectType is "contacts", set include_associated_deals to also return deal IDs linked to the matching contacts.
tags: ['agent-builder-tool']
enabled: true
triggers:
  - type: 'manual'
inputs:
  - name: objectType
    type: choice
    options:
      - 'contacts'
      - 'companies'
      - 'deals'
      - 'tickets'
    required: false
    description: 'The type of CRM record to search or list. Omit to search across all types at once.'
  - name: query
    type: string
    required: false
    description: 'Keyword to search records by name, email, company, or other text. Omit to list all records (only valid when objectType is provided).'
  - name: limit
    type: number
    required: false
    description: 'Maximum number of results to return per type (default: 10 for single-type, 5 for all-types).'
  - name: include_associated_deals
    type: boolean
    required: false
    description: 'Only applies when objectType is "contacts". When true, also returns deal IDs associated with the matching contacts.'
steps:
  - name: single-or-all
    type: if
    condition: "${{ inputs.objectType != '' }}"
    steps:
      - name: search-crm-objects
        type: hubspot.searchCrmObjects
        connector-id: <%= hubspot-stack-connector-id %>
        with:
          objectType: "${{inputs.objectType}}"
          query: "${{inputs.query}}"
          limit: ${{inputs.limit}}
          includeAssociatedDeals: ${{inputs.include_associated_deals}}
      - name: map-results
        type: data.map
        items: ${{ steps['search-crm-objects'].output }}
        with:
          fields:
            total: "${{ item.total }}"
            paging_after: "${{ item.paging.next.after }}"
            results:
              $map: { items: "${{ item.results }}", item: "record" }
              id: "${{ record.id }}"
              properties: "${{ record.properties }}"
              createdAt: "${{ record.createdAt }}"
              updatedAt: "${{ record.updatedAt }}"
              archived: "${{ record.archived }}"
              contacts: ${{ record.contacts }}
    else:
      - name: search-all-types
        type: hubspot.searchBroad
        connector-id: <%= hubspot-stack-connector-id %>
        with:
          query: "${{inputs.query}}"
          limit: ${{inputs.limit}}
