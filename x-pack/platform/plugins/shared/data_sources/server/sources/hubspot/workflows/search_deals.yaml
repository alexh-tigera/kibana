version: '1'
name: 'sources.hubspot.search_deals'
description: 'Search HubSpot deals with optional keyword, owner, pipeline, and stage filters. Use when you need to find deals by name, filter by the deal owner (use list_owners to resolve a name to an ownerId), or narrow by sales pipeline and deal stage (use list_pipelines to discover valid IDs). Inputs: query (string, optional), ownerId (string, optional — HubSpot owner ID), pipeline (string, optional), dealStage (string, optional), limit (number, optional).'
tags: ['agent-builder-tool']
enabled: true
triggers:
  - type: 'manual'
inputs:
  - name: query
    type: string
    required: false
    description: 'Keyword to search for in deal names or properties.'
  - name: ownerId
    type: string
    required: false
    description: 'HubSpot owner ID (hubspot_owner_id) to filter deals by. Use the list_owners workflow to resolve an owner name to their ID.'
  - name: pipeline
    type: string
    required: false
    description: 'Pipeline ID to filter by (for example, "default"). Use list_pipelines to discover valid pipeline IDs.'
  - name: dealStage
    type: string
    required: false
    description: 'Deal stage ID to filter by (for example, "appointmentscheduled", "closedwon", "closedlost"). Use list_pipelines to discover valid stage IDs.'
  - name: limit
    type: number
    required: false
    description: 'Maximum number of results to return (default: 10).'
steps:
  - name: search-deals
    type: hubspot.searchDeals
    connector-id: <%= hubspot-stack-connector-id %>
    with:
      query: "${{inputs.query}}"
      ownerId: "${{inputs.ownerId}}"
      pipeline: "${{inputs.pipeline}}"
      dealStage: "${{inputs.dealStage}}"
      limit: ${{inputs.limit}}
  - name: map-results
    type: data.map
    items: ${{ steps['search-deals'].output }}
    with:
      fields:
        total: "${{ item.total }}"
        paging_after: "${{ item.paging.next.after }}"
        results:
          $map: { items: "${{ item.results }}", item: "deal" }
          id: "${{ deal.id }}"
          properties: "${{ deal.properties }}"
          createdAt: "${{ deal.createdAt }}"
          updatedAt: "${{ deal.updatedAt }}"
          archived: "${{ deal.archived }}"
